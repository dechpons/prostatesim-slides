<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Conference Presentation</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .slides {
      flex: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
    }

    .slides img {
      max-width: 90%;
      max-height: 100%;
    }

    .mentimeter {
      flex: 1;
      border-top: 2px solid #333;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<div class="container">

  <div style="height: 100vh; display: flex; justify-content: center; align-items: center; background: black;">
    <img src="qr_urologie.png" style="max-width: 60%; height: auto;" alt="QR Code">
  </div>

  <!-- Mentimeter section -->
  <div class="mentimeter">
    <iframe 
      src="https://www.mentimeter.com/app/presentation/aluuny79aw4wbhun137im9y2rvfsokgk/embed"
      allowfullscreen>
    </iframe>
  </div>

</div>

</body>
</html>
