<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Conference Presentation</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .slide {
      width: 100vw;
      height: 100vh;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .active {
      display: flex;
    }

    .qr img {
      max-width: 60%;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

<!-- Slide 1: QR -->
<div class="slide active qr" id="slide1">
  <img src="qr_urologie.png" alt="QR Code">
</div>

<!-- Slide 2: Mentimeter -->
<div class="slide" id="slide2">

  <iframe
    sandbox="allow-popups allow-scripts allow-same-origin allow-presentation"
    allowfullscreen
    src="https://www.mentimeter.com/app/presentation/aluuny79aw4wbhun137im9y2rvfsokgk/embed">
  </iframe>

</div>

<script>
  let currentSlide = 1;
  const totalSlides = 2;

  function showSlide(n) {
    for (let i = 1; i <= totalSlides; i++) {
      document.getElementById("slide" + i).classList.remove("active");
    }
    document.getElementById("slide" + n).classList.add("active");
  }

  // click anywhere -> next slide
  document.body.addEventListener("click", () => {
    currentSlide++;
    if (currentSlide > totalSlides) currentSlide = totalSlides;
    showSlide(currentSlide);
  });

  // keyboard support (optional but useful)
  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight" || e.key === " ") {
      currentSlide++;
      if (currentSlide > totalSlides) currentSlide = totalSlides;
      showSlide(currentSlide);
    }

    if (e.key === "ArrowLeft") {
      currentSlide--;
      if (currentSlide < 1) currentSlide = 1;
      showSlide(currentSlide);
    }
  });
</script>

</body>
</html>
